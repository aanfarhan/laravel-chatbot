name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - '**.md'

jobs:
  test:
    name: P${{ matrix.php }} / L${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        laravel: ['11.*', '12.*']
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, json, openssl
          coverage: none
          tools: composer:v2

      - name: Configure Composer platform
        run: composer config platform.php ${{ matrix.php }}.0

      - name: Constrain Laravel / Testbench versions
        run: |
          composer require \
            "illuminate/contracts:${{ matrix.laravel }}" \
            "illuminate/http:${{ matrix.laravel }}" \
            "illuminate/routing:${{ matrix.laravel }}" \
            "illuminate/support:${{ matrix.laravel }}" \
            --no-update --no-interaction
          composer require \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --dev --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Pint (formatting)
        run: vendor/bin/pint --test

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M

      - name: Pest
        run: vendor/bin/pest

  js:
    name: JS (Vitest + Vite build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Vitest
        run: npm test

      - name: Vite build
        run: npm run build

      - name: Verify dist is up-to-date
        run: |
          git diff --exit-code dist/ || (echo "dist/ is stale — run 'npm run build' and commit" && exit 1)
